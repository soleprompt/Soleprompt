<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 375" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="600" y2="375" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0a12"/>
      <stop offset="100%" stop-color="#14141f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0066ff" stop-opacity="0.15"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="600" height="375" fill="url(#bg)"/>
  <circle cx="520" cy="60" r="80" fill="#f59e0b" opacity="0.12"/>
